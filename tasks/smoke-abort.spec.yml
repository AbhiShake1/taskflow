name: smoke-abort
root:
  stage: abort-stage
  steps:
    - leaf: slow-loop
      agent: claude-code
      model: sonnet
      task: |
        Run the following shell command using the Bash tool: `for i in $(seq 1 60); do echo $i; sleep 2; done > {cwd}/data/smoke/countdown.txt`.
        This will take roughly 120 seconds. Report "counting" immediately so we know you started. Do NOT wait for the
        command to finish before responding.
      claims: ["data/smoke/countdown.txt"]
