name: smoke-timeout
root:
  stage: timeout-stage
  steps:
    - leaf: slow-task
      agent: claude-code
      model: sonnet
      timeoutMs: 5000
      task: |
        Run the following shell command using the Bash tool: `for i in $(seq 1 60); do echo $i; sleep 2; done`.
        This will take about 2 minutes. Report "counting" immediately so we know you started. Do NOT wait for the
        command to finish before responding — the Bash tool's background mode is fine.
      claims: ["data/smoke/timeout-log.txt"]
