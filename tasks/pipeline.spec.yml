name: pipeline
root:
  stage: pipeline
  steps:
    - stage: discover
      steps:
        - leaf: emit-nums
          agent: claude-code
          model: sonnet
          task: |
            Using the Bash or Write tool, create the file at absolute path {cwd}/data/pipeline/nums.json containing the
            JSON array of integers from 1 through 30 (inclusive), in order. The file must be exactly one line of JSON,
            for example: [1,2,3,...,30]. Create parent directories if needed. Respond "done" when written.
          claims: ["data/pipeline/nums.json"]

    - stage: compute
      parallel: true
      expand: { count: 3, as: i }
      steps:
        - leaf: "square-{i}"
          agent: claude-code
          model: sonnet
          task: |
            You are chunk {i} of 3. Read {cwd}/data/pipeline/nums.json which contains a JSON array of 30 integers.
            Your share is array indices {i}*10 through {i}*10+9 inclusive (ten values). Compute the square of each value
            in your share and write the result to {cwd}/data/pipeline/chunk-{i}.json as JSON of shape
            object-with-fields: chunk (integer, your chunk index), squares (array of ten integers, the squared values in
            original order). Do NOT process values outside your share. Respond "chunk {i} done" when written.
          claims: ["data/pipeline/chunk-{i}.json"]

    - stage: aggregate
      steps:
        - leaf: sum-all
          agent: claude-code
          model: sonnet
          task: |
            Read the three files {cwd}/data/pipeline/chunk-0.json, {cwd}/data/pipeline/chunk-1.json,
            {cwd}/data/pipeline/chunk-2.json — each has a squares array. Sum every value across all three arrays.
            Compute the reference value yourself: it is the sum of i*i for i from 1 through 30 inclusive (which equals
            30*31*61/6). Then write {cwd}/data/pipeline/summary.json as JSON with keys total (the computed sum), expected
            (the reference value), ok (boolean, true iff total equals expected). Respond "aggregate done".
          claims: ["data/pipeline/summary.json"]
