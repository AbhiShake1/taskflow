# Release workflow
# Trigger: pushing a semver tag of the form v*.*.* (e.g. v0.1.0, v1.2.3).
# Auth: npm Trusted Publishing (OIDC). Configure the publisher on the npm
#   package settings page pointing at AbhiShake1/taskflow + this workflow.
#   No NPM_TOKEN secret needed.
# Permissions:
#   - contents: write   -> needed by softprops/action-gh-release to create the GitHub release.
#   - id-token: write   -> needed for OIDC auth + npm publish --provenance (sigstore signing).
# Notes:
#   - The workflow verifies that the pushed git tag matches package.json's version
#     before publishing, so a mistagged release fails fast.
#   - Trusted Publishing requires npm >= 11.5.1; we upgrade before the publish step
#     because Node 20's bundled npm is 10.x.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Publish to npm and create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version: ${PKG_VERSION}"
          echo "git tag version:      ${TAG_VERSION}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Upgrade npm for Trusted Publishing support
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
