# CI workflow
# Trigger: pull requests targeting main, and direct pushes to main.
# Required secrets: none.
# Purpose: build, typecheck, and run the test suite to catch regressions
# before they reach main or a release tag.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck (dev tsconfig)
        run: npx tsc --noEmit

      - name: Test
        run: npm run test
